<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Elements</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- pseudo-element =  keyword added after a selector
                           that's used to style specific
                           parts of an element
                           
                           selector::pseudo-element
    -->

    <h1>Hello</h1>

    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quas dolorum minus similique illum temporibus aut officia blanditiis voluptas expedita eligendi! Rerum est saepe, repudiandae nesciunt quis odio sequi nobis ratione?</p>

    <ul id="fruit">
        <li id="apple">apple</li>
        <li id="orange">orange</li>
        <li id="banana">banana</li>
    </ul>
    
</body>
</html>
